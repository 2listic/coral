<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    
    <div id="container2D">
        <canvas id="canvas2D"></canvas>
        <button id="switchMode">Switch to 3D</button>
    </div>

    <div id="container3D" class="container-fluid container3d-wrapper">
        <div class="row h-100">
            <!-- Card Column (1/3 width) -->
            <div class="col-12 col-md-2">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">Add Models</h5>
                        
                        <form>
                            <!-- <div class="mb-3"> -->
                            <!--     <label for="cubeWidth" class="form-label">Width:</label> -->
                            <!--     <input type="number" class="form-control" id="cubeWidth" value="1" step="0.1"> -->
                            <!-- </div> -->
                            <!--  -->
                            <!-- <div class="mb-3"> -->
                            <!--     <label for="cubeHeight" class="form-label">Height:</label> -->
                            <!--     <input type="number" class="form-control" id="cubeHeight" value="1" step="0.1"> -->
                            <!-- </div> -->
                            <!--  -->
                            <!-- <div class="mb-3"> -->
                            <!--     <label for="cubeDepth" class="form-label">Depth:</label> -->
                            <!--     <input type="number" class="form-control" id="cubeDepth" value="1" step="0.1"> -->
                            <!-- </div> -->

			<!-- Dropdown with Thumbnails -->
			<div class="mb-3">
			    <label class="form-label">Choose a model:</label>
			<div class="dropdown">
			  <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton" data-bs-toggle="dropdown" aria-expanded="false">
				  Select a model
			  </button>
			  <ul class="dropdown-menu w-100" aria-labelledby="dropdownMenuButton" style="max-height: 300px; overflow-y: auto;">
				    <!-- Image 1 -->
				    <li class="dropdown-item" onclick="selectImage('Air Cooler')">
					<img src="public/cooler.jpg" alt="cooler" class="img-thumbnail" style="width: 50px; height: 50px;">
					<span>Cooler</span>
				    </li>
				    <!-- Image 2 -->
				    <li class="dropdown-item" onclick="selectImage('Chair')">
					<img src= "public/cooler.jpg" alt="chair" class="img-thumbnail" style="width: 50px; height: 50px;">
					<span>Chair</span>
				    </li>
				    <!-- Image 3 -->
				    <li class="dropdown-item" onclick="selectImage('Table')">
					<img src="public/cooler.jpg"  alt="table" class="img-thumbnail" style="width: 50px; height: 50px;">
					<span>Table</span>
				    </li>
				</ul>
			    </div>
			</div>

				    
		        <button id="add_model" type="button" class="btn btn-primary w-100 mb-3">Add Model</button>
		        <hr>
		        <button type="button" class="btn btn-danger w-100" onclick="deleteCube()">Delete Model</button>
			</form>
			
			<p id="selectedImageText">Selected Model: None</p>

                    </div>
                </div>
            </div>

            <!-- Canvas3D Column (2/3 width) -->
            <div class="col-12 col-md-8">
                <canvas id="canvas3D"></canvas>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.15/paper-full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.6/dat.gui.min.js"></script>
    <script type="module" src="script.js"></script>
    <script>
    function selectImage(imageName) {
        document.getElementById('selectedImageText').innerText = `Selected Image: ${imageName}`;
        console.log(`Image Selected: ${imageName}`);
    }
    </script> 
</body>
</html>
